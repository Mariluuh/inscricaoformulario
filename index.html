<!DOCTYPE html>
<html lang="pt-br">
<head>
<link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário para a Trabalhar com a Educação!</title>
</head>
<body>
<link rel="stylesheet" href="style.css">
    <header>
        <h1>Seja bem vindo ao formulário de inscrição de vagas!</h1>
        <img src="botao-faca-inscricao-azul.png" alt="imagem da frase faça sua inscrição" title="imagem de um ticket de inscrição">
        <article>
            <h2>Abaixo encontra-se um formulário para preenchimento de inscrições e interesses de vagas para lecionar em algumas matérias disponiveis na instituição.</h2>

            <section>
                <form action="">
                    
                <label for="nome">Nome: </label>
                <input type="text"id="nome" name="nome" required> <br>

                <label for="email">E-mail: </label>
                <input type="email"id="email" name="email" required> <br>

                <label for="idade">Idade: </label>
                <input type="number" min="0" max="120"> <br>

                <label for="materia">Matéria que deseja Lecionar: </label>
                <select name="materia" id="materia">
                    <option value="materia">Matéria</option>
                    <option value="matematica">Matemática</option>
                    <option value="portugues">Português</option>
                    <option value="biologia">Biologia</option>
                    <option value="ciencias">Ciências</option>
                    <option value="historia">História</option>
                    <option value="geografia">Geografia</option>
                    <option value="artes">Artes</option>
                </select>
                
                <br>

                <label for="turnosdisp">Turnos Disponíveis: </label>
                <select name="turnosdisp" id="turnosdisp">    
                    <option value="turnosdisp">Turno Disponível</option>
                    <option value="matutino">Matutino</option>
                    <option value="vespertino">Vespertino</option>
                    <option value="noturno">Noturno</option>
                    <option value="diurno">Diurno</option>
                </select>
                <br>

                <input type="submit" value="Enviar Mensagem">

                </form>

            </section>

        </article>

    </header>
</body>
<footer>
<link rel="stylesheet" href="style.css">
    <p>Criado por Marieli Eccher</p>
</footer>
</html>
